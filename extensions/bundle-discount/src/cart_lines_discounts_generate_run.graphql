# REPLACES src/cart_lines_discounts_generate_run.graphql in the generated extension.
query CartLinesDiscountsGenerateRun {
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
  }
  discount {
    discountClasses
    metafield(namespace: "bundle_engine", key: "config") {
      value
    }
  }
}
